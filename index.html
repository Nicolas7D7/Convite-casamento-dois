<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lista de Presentes | Nicolas & Phamyla</title>
  <meta name="description" content="Lista de presentes de casamento de Nicolas & Phamyla.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Dancing+Script:wght@500;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #061326;
      --navy-2: #0a1b33;
      --navy-3: #102642;
      --gold: #d8b46b;
      --gold-soft: #f3dca9;
      --ivory: #fff8ec;
      --muted: #c6d0dc;
      --muted-2: #8f9daf;
      --line: rgba(216, 180, 107, 0.42);
      --line-strong: rgba(216, 180, 107, 0.72);
      --shadow: 0 22px 58px rgba(0, 0, 0, 0.34);
      --radius: 8px;
      --container: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ivory);
      background:
        linear-gradient(115deg, rgba(216, 180, 107, 0.08), transparent 30%),
        linear-gradient(245deg, rgba(255, 248, 236, 0.05), transparent 28%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0, rgba(255, 255, 255, 0.025) 1px, transparent 1px, transparent 94px),
        var(--navy);
      font-family: "Jost", Arial, sans-serif;
      font-weight: 300;
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(rgba(216, 180, 107, 0.12), rgba(216, 180, 107, 0.12)) left 24px top 24px / calc(100% - 48px) 1px no-repeat,
        linear-gradient(rgba(216, 180, 107, 0.12), rgba(216, 180, 107, 0.12)) left 24px bottom 24px / calc(100% - 48px) 1px no-repeat,
        linear-gradient(90deg, rgba(216, 180, 107, 0.12), rgba(216, 180, 107, 0.12)) left 24px top 24px / 1px calc(100% - 48px) no-repeat,
        linear-gradient(90deg, rgba(216, 180, 107, 0.12), rgba(216, 180, 107, 0.12)) right 24px top 24px / 1px calc(100% - 48px) no-repeat;
    }

    body.modal-open {
      overflow: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
    }

    img {
      display: block;
      max-width: 100%;
    }

    [hidden] {
      display: none !important;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(100%, var(--container));
      margin: 0 auto;
      padding: 34px 18px 24px;
    }

    .hero {
      min-height: 390px;
      display: grid;
      place-items: center;
      padding: 42px 0 36px;
      text-align: center;
    }

    .hero-inner {
      width: min(100%, 760px);
    }

    .couple-mark {
      display: inline-grid;
      place-items: center;
      width: 82px;
      height: 82px;
      margin-bottom: 22px;
      border: 1px solid var(--line-strong);
      border-radius: 50%;
      color: var(--gold-soft);
      font-family: "Dancing Script", cursive;
      font-size: 2rem;
      box-shadow: inset 0 0 0 8px rgba(216, 180, 107, 0.04);
    }

    .script-name {
      margin: 0;
      color: var(--gold-soft);
      font-family: "Dancing Script", cursive;
      font-size: clamp(2.65rem, 13vw, 6.25rem);
      font-weight: 700;
      line-height: 0.9;
    }

    h1 {
      margin: 18px 0 0;
      color: var(--ivory);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2.35rem, 9vw, 5.15rem);
      font-weight: 600;
      line-height: 0.95;
    }

    .intro {
      width: min(100%, 640px);
      margin: 24px auto 0;
      color: var(--muted);
      font-size: clamp(1rem, 3.6vw, 1.22rem);
      line-height: 1.75;
    }

    .divider {
      width: min(210px, 58vw);
      height: 1px;
      margin: 28px auto 0;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .toolbar {
      padding: 8px 0 24px;
    }

    .filters {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 0 0 8px;
      scrollbar-width: thin;
      scrollbar-color: rgba(216, 180, 107, 0.55) transparent;
    }

    .filter-button {
      flex: 0 0 auto;
      min-height: 42px;
      padding: 0 18px;
      border: 1px solid rgba(216, 180, 107, 0.38);
      border-radius: 999px;
      color: var(--ivory);
      background: rgba(255, 248, 236, 0.04);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, color 180ms ease;
    }

    .filter-button:hover,
    .filter-button:focus-visible {
      border-color: var(--gold);
      background: rgba(216, 180, 107, 0.12);
      outline: none;
      transform: translateY(-1px);
    }

    .filter-button.is-active {
      border-color: var(--gold);
      color: #101827;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      font-weight: 500;
    }

    .state {
      margin: 18px 0 22px;
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(8, 25, 48, 0.76);
      color: var(--muted);
      text-align: center;
      box-shadow: var(--shadow);
    }

    .state strong {
      display: block;
      margin-bottom: 8px;
      color: var(--gold-soft);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 1.55rem;
      font-weight: 600;
    }

    .state p {
      margin: 0;
      line-height: 1.65;
    }

    .loading-line {
      width: min(280px, 80vw);
      height: 3px;
      margin: 18px auto 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(216, 180, 107, 0.16);
    }

    .loading-line span {
      display: block;
      width: 40%;
      height: 100%;
      border-radius: inherit;
      background: var(--gold);
      animation: load 1.15s ease-in-out infinite;
    }

    @keyframes load {
      0% { transform: translateX(-110%); }
      100% { transform: translateX(260%); }
    }

    .gift-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      padding-bottom: 48px;
    }

    .gift-card {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(9, 26, 49, 0.86);
      box-shadow: 0 20px 42px rgba(0, 0, 0, 0.24);
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .gift-card:hover {
      border-color: rgba(216, 180, 107, 0.72);
      background: rgba(12, 32, 59, 0.92);
      transform: translateY(-2px);
    }

    .gift-card.is-chosen {
      opacity: 0.72;
    }

    .gift-media {
      position: relative;
      aspect-ratio: 4 / 3;
      border-bottom: 1px solid rgba(216, 180, 107, 0.28);
      background: #0d2039;
    }

    .gift-media img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gift-placeholder {
      display: grid;
      height: 100%;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(140deg, rgba(216, 180, 107, 0.16), transparent 44%),
        linear-gradient(320deg, rgba(255, 248, 236, 0.08), transparent 36%),
        #0b1d35;
      color: var(--gold-soft);
      text-align: center;
    }

    .gift-placeholder span {
      display: grid;
      width: 74px;
      height: 74px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: 50%;
      font-family: "Dancing Script", cursive;
      font-size: 2.2rem;
    }

    .gift-body {
      display: grid;
      gap: 14px;
      padding: 18px;
    }

    .gift-topline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }

    .category {
      color: var(--gold-soft);
      font-size: 0.86rem;
      font-weight: 400;
    }

    .status {
      display: inline-flex;
      min-height: 28px;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
      border: 1px solid rgba(216, 180, 107, 0.38);
      border-radius: 999px;
      color: var(--ivory);
      font-size: 0.78rem;
      line-height: 1;
    }

    .status.is-available {
      color: #152033;
      background: var(--gold-soft);
      border-color: var(--gold-soft);
      font-weight: 500;
    }

    .status.is-chosen {
      color: var(--muted);
      background: rgba(255, 248, 236, 0.05);
    }

    .gift-title {
      margin: 0;
      color: var(--ivory);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(1.55rem, 7vw, 2rem);
      font-weight: 600;
      line-height: 1.05;
    }

    .gift-value,
    .gift-note {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
    }

    .gift-value {
      color: var(--gold-soft);
      font-weight: 400;
    }

    .gift-action {
      width: 100%;
      min-height: 48px;
      margin-top: 4px;
      border: 1px solid var(--gold);
      border-radius: 999px;
      color: #101827;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      font-weight: 500;
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease;
    }

    .gift-action:hover,
    .gift-action:focus-visible {
      outline: none;
      transform: translateY(-1px);
      box-shadow: 0 12px 30px rgba(216, 180, 107, 0.18);
    }

    .gift-action:disabled {
      color: var(--muted);
      background: transparent;
      border-color: rgba(255, 248, 236, 0.2);
      box-shadow: none;
      transform: none;
      opacity: 1;
    }

    .footer {
      padding: 30px 0 14px;
      border-top: 1px solid rgba(216, 180, 107, 0.22);
      color: var(--muted-2);
      text-align: center;
    }

    .footer strong {
      display: block;
      margin-bottom: 8px;
      color: var(--gold-soft);
      font-family: "Dancing Script", cursive;
      font-size: 2.1rem;
      font-weight: 700;
    }

    .modal {
      position: fixed;
      z-index: 20;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 20px;
      background: rgba(2, 8, 18, 0.74);
      backdrop-filter: blur(10px);
    }

    .modal-panel {
      position: relative;
      width: min(100%, 520px);
      max-height: calc(100vh - 40px);
      overflow: auto;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #08182d;
      box-shadow: var(--shadow);
    }

    .modal-content {
      padding: 28px 20px 22px;
    }

    .modal-close {
      position: absolute;
      top: 12px;
      right: 12px;
      display: grid;
      width: 38px;
      height: 38px;
      place-items: center;
      border: 1px solid rgba(216, 180, 107, 0.3);
      border-radius: 50%;
      color: var(--ivory);
      background: rgba(255, 248, 236, 0.04);
      font-size: 1.35rem;
      line-height: 1;
    }

    .modal-close:hover,
    .modal-close:focus-visible {
      outline: none;
      border-color: var(--gold);
      color: var(--gold-soft);
    }

    .modal-eyebrow {
      margin: 0 48px 6px 0;
      color: var(--gold-soft);
      font-size: 0.9rem;
      font-weight: 400;
    }

    .modal-title {
      margin: 0;
      color: var(--ivory);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      font-weight: 600;
      line-height: 1;
    }

    .selected-gift {
      margin: 12px 0 20px;
      color: var(--muted);
      line-height: 1.6;
    }

    .form-grid {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: var(--gold-soft);
      font-size: 0.92rem;
      font-weight: 400;
    }

    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid rgba(216, 180, 107, 0.34);
      border-radius: var(--radius);
      color: var(--ivory);
      background: rgba(255, 248, 236, 0.05);
      outline: none;
      transition: border-color 180ms ease, background 180ms ease;
    }

    .field input {
      min-height: 48px;
      padding: 0 14px;
    }

    .field textarea {
      min-height: 112px;
      resize: vertical;
      padding: 13px 14px;
      line-height: 1.5;
    }

    .field input:focus,
    .field textarea:focus {
      border-color: var(--gold);
      background: rgba(255, 248, 236, 0.08);
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: rgba(198, 208, 220, 0.62);
    }

    .form-error {
      padding: 12px 14px;
      border: 1px solid rgba(243, 220, 169, 0.46);
      border-radius: var(--radius);
      color: var(--ivory);
      background: rgba(216, 180, 107, 0.1);
      line-height: 1.5;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .primary-button,
    .secondary-button,
    .link-button {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 999px;
      text-align: center;
      text-decoration: none;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, opacity 180ms ease;
    }

    .primary-button,
    .link-button {
      border: 1px solid var(--gold);
      color: #101827;
      background: linear-gradient(135deg, var(--gold-soft), var(--gold));
      font-weight: 500;
    }

    .secondary-button {
      border: 1px solid rgba(216, 180, 107, 0.42);
      color: var(--ivory);
      background: rgba(255, 248, 236, 0.04);
    }

    .primary-button:hover,
    .primary-button:focus-visible,
    .secondary-button:hover,
    .secondary-button:focus-visible,
    .link-button:hover,
    .link-button:focus-visible {
      outline: none;
      transform: translateY(-1px);
    }

    .primary-button:disabled {
      opacity: 0.68;
      transform: none;
    }

    .success-mark {
      display: grid;
      width: 76px;
      height: 76px;
      margin-bottom: 18px;
      place-items: center;
      border: 1px solid var(--line-strong);
      border-radius: 50%;
      color: var(--gold-soft);
      font-family: "Cormorant Garamond", Georgia, serif;
      font-size: 2.1rem;
    }

    .success-text {
      margin: 14px 0 0;
      color: var(--muted);
      line-height: 1.65;
    }

    @media (min-width: 640px) {
      .page {
        padding: 42px 28px 28px;
      }

      .hero {
        min-height: 430px;
      }

      .filters {
        justify-content: center;
        flex-wrap: wrap;
        overflow: visible;
      }

      .gift-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 20px;
      }

      .modal-content {
        padding: 34px 30px 28px;
      }

      .modal-actions {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (min-width: 980px) {
      .page {
        padding-top: 50px;
      }

      .hero {
        min-height: 470px;
      }

      .gift-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.001ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header class="hero">
      <div class="hero-inner">
        <div class="couple-mark" aria-hidden="true">N&P</div>
        <p class="script-name">Nicolas &amp; Phamyla</p>
        <h1>Lista de Presentes</h1>
        <p class="intro">Sua presença já é o nosso maior presente. Mas, se desejar nos presentear, preparamos algumas sugestões com carinho.</p>
        <div class="divider" aria-hidden="true"></div>
      </div>
    </header>

    <section class="toolbar" aria-label="Filtros da lista de presentes">
      <div class="filters" id="filters"></div>
    </section>

    <section class="state" id="state" hidden></section>
    <section class="gift-grid" id="giftGrid" aria-live="polite"></section>

    <footer class="footer">
      <strong>Nicolas &amp; Phamyla</strong>
      <span>31 · 10 · 2026</span>
    </footer>
  </main>

  <div class="modal" id="giftModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
    <div class="modal-panel">
      <button class="modal-close" type="button" id="closeModal" aria-label="Fechar">×</button>

      <div class="modal-content" id="choiceView">
        <p class="modal-eyebrow">Confirmar presente</p>
        <h2 class="modal-title" id="modalTitle">Quero presentear</h2>
        <p class="selected-gift" id="selectedGiftText"></p>

        <form id="giftForm" novalidate>
          <div class="form-grid">
            <div class="field">
              <label for="guestName">Nome</label>
              <input id="guestName" name="guestName" type="text" autocomplete="name" maxlength="100" required>
            </div>

            <div class="field">
              <label for="guestWhatsapp">WhatsApp</label>
              <input id="guestWhatsapp" name="guestWhatsapp" type="tel" inputmode="tel" autocomplete="tel" maxlength="30" placeholder="(00) 00000-0000" required>
            </div>

            <div class="field">
              <label for="guestMessage">Mensagem opcional</label>
              <textarea id="guestMessage" name="guestMessage" maxlength="500" placeholder="Deixe uma mensagem para os noivos"></textarea>
            </div>
          </div>

          <div class="form-error" id="formError" hidden></div>

          <div class="modal-actions">
            <button class="primary-button" type="submit" id="confirmButton">Confirmar escolha</button>
            <button class="secondary-button" type="button" id="cancelButton">Cancelar</button>
          </div>
        </form>
      </div>

      <div class="modal-content" id="successView" hidden>
        <div class="success-mark" aria-hidden="true">✓</div>
        <p class="modal-eyebrow">Presente reservado</p>
        <h2 class="modal-title">Obrigado pelo carinho!</h2>
        <p class="success-text" id="successText"></p>

        <div class="modal-actions">
          <a class="link-button" id="purchaseLink" href="#" target="_blank" rel="noopener" hidden>Comprar presente</a>
          <button class="secondary-button" type="button" id="backToList">Voltar à lista</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Cole aqui a URL do Web App do Apps Script terminada em /exec.
    const GIFTS_ENDPOINT = "COLE_AQUI_A_URL_DO_WEB_APP_DO_APPS_SCRIPT";

    const FILTERS = ["Todos", "Cozinha", "Quarto", "Banheiro", "Decoração", "Eletro", "Outros"];

    const elements = {
      filters: document.getElementById("filters"),
      state: document.getElementById("state"),
      giftGrid: document.getElementById("giftGrid"),
      modal: document.getElementById("giftModal"),
      closeModal: document.getElementById("closeModal"),
      cancelButton: document.getElementById("cancelButton"),
      choiceView: document.getElementById("choiceView"),
      successView: document.getElementById("successView"),
      selectedGiftText: document.getElementById("selectedGiftText"),
      giftForm: document.getElementById("giftForm"),
      guestName: document.getElementById("guestName"),
      guestWhatsapp: document.getElementById("guestWhatsapp"),
      guestMessage: document.getElementById("guestMessage"),
      formError: document.getElementById("formError"),
      confirmButton: document.getElementById("confirmButton"),
      successText: document.getElementById("successText"),
      purchaseLink: document.getElementById("purchaseLink"),
      backToList: document.getElementById("backToList")
    };

    let gifts = [];
    let currentFilter = "Todos";
    let selectedGift = null;
    let isLoading = false;
    let loadError = "";

    document.addEventListener("DOMContentLoaded", init);

    function init() {
      renderFilters();
      bindEvents();
      loadGifts();
    }

    function bindEvents() {
      elements.filters.addEventListener("click", function (event) {
        const button = event.target.closest("[data-filter]");
        if (!button) return;
        currentFilter = button.dataset.filter;
        renderFilters();
        renderGifts();
      });

      elements.giftGrid.addEventListener("click", function (event) {
        const button = event.target.closest("[data-choose-id]");
        if (!button || button.disabled) return;
        const gift = gifts.find(function (item) {
          return item.id === button.dataset.chooseId;
        });
        if (gift && isGiftAvailable(gift)) {
          openChoiceModal(gift);
        }
      });

      elements.closeModal.addEventListener("click", closeChoiceModal);
      elements.cancelButton.addEventListener("click", closeChoiceModal);
      elements.backToList.addEventListener("click", closeChoiceModal);

      elements.modal.addEventListener("click", function (event) {
        if (event.target === elements.modal) {
          closeChoiceModal();
        }
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && !elements.modal.hidden) {
          closeChoiceModal();
        }
      });

      elements.giftForm.addEventListener("submit", submitChoice);
    }

    function renderFilters() {
      elements.filters.innerHTML = FILTERS.map(function (filter) {
        const active = filter === currentFilter;
        return [
          '<button class="filter-button',
          active ? " is-active" : "",
          '" type="button" data-filter="',
          escapeAttribute(filter),
          '" aria-pressed="',
          active ? "true" : "false",
          '">',
          escapeHtml(filter),
          "</button>"
        ].join("");
      }).join("");
    }

    async function loadGifts() {
      isLoading = true;
      loadError = "";
      renderGifts();

      try {
        const response = await jsonpRequest({ action: "listGifts" });
        if (!response || !response.ok) {
          throw new Error(response && response.error ? response.error : "Não foi possível carregar os presentes.");
        }
        gifts = Array.isArray(response.gifts) ? response.gifts.map(normalizeGift) : [];
      } catch (error) {
        loadError = error.message || "Não foi possível carregar os presentes.";
      } finally {
        isLoading = false;
        renderGifts();
      }
    }

    function renderGifts() {
      elements.giftGrid.innerHTML = "";
      hideState();

      if (isLoading) {
        showState("Carregando presentes", "Estamos preparando a lista com carinho.", true);
        return;
      }

      if (loadError) {
        showState("Não foi possível carregar a lista", loadError, false);
        return;
      }

      if (!gifts.length) {
        showState("Nenhum presente cadastrado", "Assim que os presentes ativos forem adicionados na planilha, eles aparecerão aqui.", false);
        return;
      }

      const visibleGifts = gifts.filter(function (gift) {
        return currentFilter === "Todos" || gift.category === currentFilter;
      });

      const allGiftsChosen = gifts.every(function (gift) {
        return !isGiftAvailable(gift);
      });

      if (allGiftsChosen) {
        showState("Todos os presentes já foram escolhidos", "Recebemos muito carinho por aqui. Obrigado por fazer parte desse momento.", false);
      } else if (!visibleGifts.length) {
        showState("Nenhum presente nesta categoria", "Experimente outro filtro da lista.", false);
        return;
      }

      elements.giftGrid.innerHTML = visibleGifts.map(renderGiftCard).join("");
      attachImageFallbacks();
    }

    function renderGiftCard(gift) {
      const available = isGiftAvailable(gift);
      const image = gift.image
        ? '<img src="' + escapeAttribute(gift.image) + '" alt="' + escapeAttribute(gift.name) + '" loading="lazy">'
        : '<div class="gift-placeholder"><span>N&amp;P</span></div>';

      return [
        '<article class="gift-card',
        available ? "" : " is-chosen",
        '">',
        '<div class="gift-media">',
        image,
        "</div>",
        '<div class="gift-body">',
        '<div class="gift-topline">',
        '<span class="category">',
        escapeHtml(gift.category || "Outros"),
        "</span>",
        '<span class="status ',
        available ? "is-available" : "is-chosen",
        '">',
        available ? "Disponível" : "Escolhido",
        "</span>",
        "</div>",
        '<h3 class="gift-title">',
        escapeHtml(gift.name),
        "</h3>",
        gift.value ? '<p class="gift-value">' + escapeHtml(gift.value) + "</p>" : "",
        gift.note ? '<p class="gift-note">' + escapeHtml(gift.note) + "</p>" : "",
        '<button class="gift-action" type="button" data-choose-id="',
        escapeAttribute(gift.id),
        '"',
        available ? "" : " disabled",
        ">",
        available ? "Quero presentear" : "Escolhido",
        "</button>",
        "</div>",
        "</article>"
      ].join("");
    }

    function attachImageFallbacks() {
      elements.giftGrid.querySelectorAll(".gift-media img").forEach(function (image) {
        image.addEventListener("error", function () {
          const holder = document.createElement("div");
          holder.className = "gift-placeholder";
          holder.innerHTML = "<span>N&amp;P</span>";
          image.replaceWith(holder);
        }, { once: true });
      });
    }

    function openChoiceModal(gift) {
      selectedGift = gift;
      elements.giftForm.reset();
      elements.formError.hidden = true;
      elements.formError.textContent = "";
      elements.selectedGiftText.textContent = gift.name;
      elements.choiceView.hidden = false;
      elements.successView.hidden = true;
      elements.purchaseLink.hidden = true;
      elements.purchaseLink.removeAttribute("href");
      elements.modal.hidden = false;
      document.body.classList.add("modal-open");
      window.setTimeout(function () {
        elements.guestName.focus();
      }, 80);
    }

    function closeChoiceModal() {
      elements.modal.hidden = true;
      document.body.classList.remove("modal-open");
      selectedGift = null;
      setSubmitting(false);
    }

    async function submitChoice(event) {
      event.preventDefault();

      if (!selectedGift) return;

      const guestName = elements.guestName.value.trim();
      const whatsapp = elements.guestWhatsapp.value.trim();
      const message = elements.guestMessage.value.trim();

      if (!guestName || !whatsapp) {
        showFormError("Preencha seu nome e WhatsApp para confirmar.");
        return;
      }

      if (whatsapp.replace(/\D/g, "").length < 10) {
        showFormError("Confira o WhatsApp informado antes de confirmar.");
        return;
      }

      setSubmitting(true);
      elements.formError.hidden = true;

      try {
        const response = await jsonpRequest({
          action: "chooseGift",
          id: selectedGift.id,
          guestName: guestName,
          whatsapp: whatsapp,
          message: message
        });

        if (!response || !response.ok) {
          throw new Error(response && response.error ? response.error : "Não foi possível reservar esse presente.");
        }

        const confirmedGift = normalizeGift(response.gift);
        gifts = gifts.map(function (gift) {
          return gift.id === confirmedGift.id ? confirmedGift : gift;
        });
        renderGifts();
        showSuccess(confirmedGift, response.message || "Presente escolhido com sucesso.");
      } catch (error) {
        showFormError(error.message || "Não foi possível reservar esse presente.");
        loadGifts();
      } finally {
        setSubmitting(false);
      }
    }

    function showSuccess(gift, message) {
      elements.choiceView.hidden = true;
      elements.successView.hidden = false;
      elements.successText.textContent = message + " O presente ficou reservado em seu nome.";

      if (gift.link) {
        elements.purchaseLink.href = gift.link;
        elements.purchaseLink.hidden = false;
      } else {
        elements.purchaseLink.hidden = true;
      }
    }

    function showFormError(message) {
      elements.formError.textContent = message;
      elements.formError.hidden = false;
    }

    function setSubmitting(isSubmitting) {
      elements.confirmButton.disabled = isSubmitting;
      elements.confirmButton.textContent = isSubmitting ? "Confirmando..." : "Confirmar escolha";
    }

    function showState(title, text, loading) {
      elements.state.hidden = false;
      elements.state.innerHTML = [
        "<strong>",
        escapeHtml(title),
        "</strong>",
        "<p>",
        escapeHtml(text),
        "</p>",
        loading ? '<div class="loading-line" aria-hidden="true"><span></span></div>' : ""
      ].join("");
    }

    function hideState() {
      elements.state.hidden = true;
      elements.state.innerHTML = "";
    }

    function jsonpRequest(params) {
      return new Promise(function (resolve, reject) {
        if (!GIFTS_ENDPOINT || GIFTS_ENDPOINT.indexOf("COLE_AQUI") !== -1) {
          reject(new Error("Cole no arquivo index.html a URL /exec do Web App do Apps Script em GIFTS_ENDPOINT."));
          return;
        }

        const callbackName = "__giftsJsonp_" + Date.now() + "_" + Math.random().toString(36).slice(2);
        const query = new URLSearchParams(Object.assign({}, params, {
          callback: callbackName,
          _: Date.now().toString()
        }));

        const separator = GIFTS_ENDPOINT.indexOf("?") === -1 ? "?" : "&";
        const script = document.createElement("script");
        let timeoutId;

        function cleanup() {
          delete window[callbackName];
          window.clearTimeout(timeoutId);
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
        }

        window[callbackName] = function (response) {
          cleanup();
          resolve(response);
        };

        script.async = true;
        script.src = GIFTS_ENDPOINT + separator + query.toString();
        script.onerror = function () {
          cleanup();
          reject(new Error("Não foi possível falar com a planilha. Confira a URL do Apps Script."));
        };

        timeoutId = window.setTimeout(function () {
          cleanup();
          reject(new Error("A conexão demorou demais. Tente novamente em instantes."));
        }, 18000);

        document.body.appendChild(script);
      });
    }

    function normalizeGift(gift) {
      const status = gift && gift.status ? String(gift.status).trim() : "Disponível";
      return {
        id: gift && gift.id ? String(gift.id).trim() : "",
        name: gift && gift.name ? String(gift.name).trim() : "Presente",
        category: gift && gift.category ? String(gift.category).trim() : "Outros",
        value: gift && gift.value ? String(gift.value).trim() : "",
        link: gift && gift.link ? String(gift.link).trim() : "",
        image: gift && gift.image ? String(gift.image).trim() : "",
        note: gift && gift.note ? String(gift.note).trim() : "",
        status: status
      };
    }

    function isGiftAvailable(gift) {
      return normalizeText(gift.status) !== "escolhido";
    }

    function normalizeText(value) {
      return String(value || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim()
        .toLowerCase();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
